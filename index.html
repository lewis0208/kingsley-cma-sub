<div class="overlay">
  <div class="header">⚡ KINGSLEYCMA ⚡</div>

  <div class="sub-count">
    <span id="subCount">{count}</span>
    <div class="label">SUBSCRIBERS</div>
  </div>

  <div class="goal-container">
    <div class="goal-text">
      <span id="current">{count}</span> / <span id="goal">1500</span>
    </div>

    <div class="goal-bar">
      <div id="progressBar" class="goal-fill"></div>
    </div>
  </div>

  <div class="latest-subs">
    <div class="latest-title">LATEST SUBS</div>
    <div id="latestSub">{subscriber}</div>
  </div>
</div>
